MEMORY {
  ZP:     start=$0000, size=$0100, type=rw;
  LOWRAM: start=$0400, size=$0C00, type=rw;
  ROM:    start=$C000, size=$4000, type=ro, fill=yes, fillval=$EA, file=%O;
}
SEGMENTS {
  CODE:     load=ROM, type=ro, start=$C000;
  LOWCODE:  load=ROM, run=LOWRAM, type=ro, define=yes;
  VECTORS:  load=ROM, type=ro, start=$FFFA;
  ZEROPAGE: load=ZP,  type=zp, optional=yes;
}
